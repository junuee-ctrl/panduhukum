name: Auto Publish (Daily)

# 매일: 큐 위에서부터 생성 → 검증 통과(🟢)하는 글이 나올 때까지 다음 주제로 시도.
#  🟢 첫 통과 글 → published:true 로 main 커밋 = 즉시 배포.
#  🟡 검증 미달 글 → published:false 초안으로 저장(사이트 비노출·빌드 안전) + 검토요청 이슈.
#  전 과정 GitHub Actions (PC 불필요).

on:
  schedule:
    - cron: "30 2 * * *"   # 매일 09:30 WIB
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: auto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: pip install anthropic requests

      - name: Run daily generation (loop until green)
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: pipeline
          RUN_MAX_TRIES: "4"
        run: |
          set +e
          python pipeline/run_daily.py > /tmp/daily.log 2>&1
          code=$?
          cat /tmp/daily.log
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Commit results to main
        if: steps.gen.outputs.code == '0'
        run: |
          git config user.name "auto-publish-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/ keyword-queue.txt
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
          else
            PUB=$(python -c "import json;m=json.load(open('manifest.json'));print((m.get('published') or {}).get('slug',''))")
            if [ -n "$PUB" ]; then
              git commit -m "publish: $PUB (auto, gate 1·2 clean) + draft tinjauan"
            else
              git commit -m "draft: artikel perlu tinjauan manusia (auto, tidak ada yang lolos 🟢)"
            fi
            git push
          fi

      - name: Open review-request issue for yellow drafts
        if: steps.gen.outputs.code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY' > /tmp/issue.md
          import json
          m = json.load(open("manifest.json"))
          ys = m.get("yellows") or []
          if ys:
              print(f"Ada {len(ys)} draft yang **belum lolos verifikasi otomatis** dan perlu tinjauan Anda sebelum dipublikasikan.\n")
              print("Untuk menerbitkan: buka file draft, verifikasi kutipan hukumnya, isi `reviewer`, lalu ubah `published` menjadi `true`.\n")
              for y in ys:
                  warns = "; ".join(w.get("type","") for w in y.get("warns", [])) or "kutipan belum terverifikasi"
                  print(f"- [ ] `{y['path']}` — {y['keyword']}  \n      alasan: {warns}")
          PY
          if [ -s /tmp/issue.md ]; then
            gh label create "needs-review" --color FBCA04 --description "Draft menunggu tinjauan" --force >/dev/null 2>&1 || true
            gh issue create \
              --title "🟡 Draft perlu tinjauan ($(date +%Y-%m-%d))" \
              --label "needs-review" \
              --body-file /tmp/issue.md || echo "gh issue create gagal (label mungkin belum ada) — lanjut."
          else
            echo "Tidak ada draft 🟡 hari ini."
          fi

      - name: "✗ run error → 이슈"
        if: steps.gen.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "generation-failed" --color B60205 --force >/dev/null 2>&1 || true
          gh issue create --title "✗ Auto-publish error ($(date +%Y-%m-%d))" \
            --label "generation-failed" \
            --body "run_daily.py keluar dengan kode ${{ steps.gen.outputs.code }}. Lihat log Actions run #${{ github.run_id }}." || true
